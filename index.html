<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>五维三层市场复盘系统 v5.0</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<style>

:root {
  --bg-deep: #060a14;
  --bg-card: #0d1321;
  --border: #1e293b;
  --accent: #3b82f6;
  --accent2: #60a5fa;
  --text: #e2e8f0;
  --text2: #94a3b8;
  --green: #22c55e;
  --orange: #f59e0b;
  --red: #ef4444;
  --purple: #8b5cf6;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  height:100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Helvetica, Arial, sans-serif;
  background: var(--bg-deep); color: var(--text); font-size: 14px; overflow-x: hidden;
}
.app { display: flex; height: 100vh; }
.sidebar {
  width: 220px; background: var(--bg-card); border-right: 1px solid var(--border);
  flex-shrink:0; display:flex; flex-direction:column; padding-top:16px; z-index:100;
}
.logo { font-size: 16px; font-weight:700; padding:0 20px 16px; color: var(--accent2); border-bottom:1px solid var(--border); }
.nav-item {
  display:flex; align-items:center; gap:10px; padding:14px 20px; cursor:pointer;
  transition: all 0.2s; border-left: 3px solid transparent; color: var(--text2);
  min-height: 48px;
}
.nav-item:hover { background: rgba(59,130,246,0.08); color: var(--text); }
.nav-item.active { background: rgba(59,130,246,0.12); color: var(--accent2); border-left-color: var(--accent); }
.nav-icon { font-size: 18px; width: 24px; text-align:center; }
.main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.topbar {
  height: 56px; background: var(--bg-card); border-bottom: 1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between; padding: 0 24px; flex-shrink:0;
}
.title { font-size: 18px; font-weight:700; color: var(--accent2); }
.date-select {
  background: var(--bg-deep); border: 1px solid var(--border); color: var(--text);
  padding: 6px 12px; border-radius: 6px; font-size: 14px; outline:none; min-height: 36px;
}
.content { flex:1; overflow-y: auto; padding: 20px; }
.page { display: none; }
.page.active { display: block; }

/* Cards */
.card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
.card {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px;
  padding: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3); transition: transform 0.2s, box-shadow 0.2s;
}
.card:hover { transform: translateY(-2px); box-shadow: 0 8px 15px -3px rgba(0,0,0,0.4); }
.card-title { font-size: 15px; font-weight: 600; margin-bottom: 12px; color: var(--accent2); }
.card-subtitle { font-size: 12px; color: var(--text2); margin-bottom: 8px; }

/* Progress bars */
.progress-bg { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; margin: 6px 0; }
.progress-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
.progress-fill.blue { background: linear-gradient(90deg, #3b82f6, #60a5fa); }
.progress-fill.green { background: linear-gradient(90deg, #22c55e, #4ade80); }
.progress-fill.orange { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
.progress-fill.red { background: linear-gradient(90deg, #ef4444, #f87171); }

/* Tags */
.tag { display: inline-block; padding: 3px 10px; border-radius: 6px; font-size: 12px; font-weight: 600; }
.tag.bull { background: rgba(34,197,94,0.15); color: var(--green); border: 1px solid rgba(34,197,94,0.3); }
.tag.bear { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
.tag.neutral { background: rgba(59,130,246,0.15); color: var(--accent); border: 1px solid rgba(59,130,246,0.3); }
.tag.warn { background: rgba(245,158,11,0.15); color: var(--orange); border: 1px solid rgba(245,158,11,0.3); }

/* Section title */
.section-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }

/* Lists */
.var-list { list-style: none; }
.var-list li { padding: 10px 0; border-bottom: 1px solid var(--border); line-height: 1.6; }
.var-list li:last-child { border-bottom: none; }
.var-list .num { display: inline-block; width: 22px; height: 22px; background: var(--accent); color: #fff; border-radius: 50%; text-align: center; font-size: 12px; line-height: 22px; margin-right: 8px; flex-shrink:0; }

/* Heat bar */
.heat-bar { display: flex; align-items: center; gap: 10px; margin: 6px 0; }
.heat-label { width: 80px; font-size: 13px; color: var(--text2); flex-shrink:0; }
.heat-track { flex: 1; height: 20px; background: var(--border); border-radius: 4px; overflow: hidden; position: relative; }
.heat-fill { height: 100%; border-radius: 4px; transition: width 0.6s; }
.heat-val { width: 40px; text-align: right; font-size: 13px; font-weight: 600; }

/* Flow table */
.flow-table { width: 100%; border-collapse: collapse; margin-top: 8px; }
.flow-table th, .flow-table td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); font-size: 13px; }
.flow-table th { color: var(--text2); font-weight: 500; font-size: 12px; text-transform: uppercase; }

/* Stock cards */
.stock-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; }
.stock-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 14px; }
.stock-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.stock-name { font-size: 15px; font-weight: 600; }
.stock-code { font-size: 12px; color: var(--text2); }

/* Derivation block */
.derive-block { background: rgba(59,130,246,0.06); border-left: 3px solid var(--accent); padding: 12px; border-radius: 0 8px 8px 0; margin: 8px 0; }
.derive-title { font-size: 12px; color: var(--text2); margin-bottom: 4px; }
.derive-val { font-size: 13px; line-height: 1.6; }

/* Mobile bottom nav */
.bottom-nav {
  display: none; position: fixed; bottom: 0; left: 0; right: 0; height: 56px;
  background: var(--bg-card); border-top: 1px solid var(--border); z-index: 200;
  justify-content: space-around; align-items: center;
}
.bnav-item { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; color: var(--text2); font-size: 11px; cursor:pointer; height:100%; }
.bnav-item.active { color: var(--accent); }
.bnav-icon { font-size: 20px; }

/* Charts */
.chart-container { width: 100%; height: 320px; background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border); margin: 12px 0; }

/* Watch list */
.watch-list { list-style: none; }
.watch-list li { padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; display: flex; align-items: flex-start; gap: 8px; }
.watch-list li::before { content: "▸"; color: var(--accent); flex-shrink:0; }

/* Responsive */
@media (max-width: 768px) {
  .app { flex-direction: column; }
  .sidebar { display: none; }
  .bottom-nav { display: flex; }
  .content { padding: 12px; padding-bottom: 72px; }
  .card-grid { grid-template-columns: 1fr; }
  .stock-grid { grid-template-columns: 1fr; }
  .chart-container { height: 260px; }
  .topbar { padding: 0 12px; height: 52px; }
  .title { font-size: 15px; }
}
@media (min-width: 769px) {
  .bottom-nav { display: none !important; }
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-deep); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Score card big */
.score-big { text-align: center; padding: 20px; }
.score-num { font-size: 42px; font-weight: 700; }
.score-label { font-size: 12px; color: var(--text2); margin-top: 4px; }

/* Misc */
.mb-16 { margin-bottom: 16px; }
.mt-16 { margin-top: 16px; }
.gap-16 { gap: 16px; }
.flex-between { display: flex; justify-content: space-between; align-items: center; }
.text-sm { font-size: 12px; }
.text-xs { font-size: 11px; }

</style>
</head>
<body>
<div class="app">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="logo">五维三层复盘</div>
    <div class="nav-item active" id="nav-overview" onclick="switchPage('overview')">
      <span class="nav-icon">📊</span><span>今日总览</span>
    </div>
    <div class="nav-item" id="nav-dimensions" onclick="switchPage('dimensions')">
      <span class="nav-icon">🔍</span><span>五维深度</span>
    </div>
    <div class="nav-item" id="nav-sector" onclick="switchPage('sector')">
      <span class="nav-icon">🔥</span><span>板块热力</span>
    </div>
    <div class="nav-item" id="nav-prediction" onclick="switchPage('prediction')">
      <span class="nav-icon">🔮</span><span>预测推导</span>
    </div>
    <div class="nav-item" id="nav-history" onclick="switchPage('history')">
      <span class="nav-icon">📈</span><span>历史趋势</span>
    </div>
    <div class="nav-item" id="nav-weekly" onclick="switchPage('weekly')">
      <span class="nav-icon">📅</span><span>周度复盘</span>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <div class="title">五维三层市场复盘系统 v5.0</div>
      <select class="date-select" id="date-select" onchange="onDateChange(this.value)">
      </select>
    </div>

    <div class="content">
      <!-- Page: Overview -->
      <div class="page active" id="page-overview">
        <div class="section-title">市场变量 Top 3</div>
        <ul class="var-list card" id="ov-vars" style="margin-bottom:16px"></ul>

        <div class="section-title">五维评分</div>
        <div class="card-grid" id="ov-dims" style="margin-bottom:16px"></div>

        <div class="card-grid" id="ov-summary" style="margin-bottom:16px"></div>

        <div class="card-grid" style="margin-bottom:16px;grid-template-columns:1fr">
          <div class="card" id="ov-pred"></div>
        </div>

        <div class="section-title">五维雷达</div>
        <div class="chart-container" id="chart-radar"></div>
      </div>

      <!-- Page: Dimensions -->
      <div class="page" id="page-dimensions">
        <div class="section-title">五维深度分析</div>
        <div id="dim-content"></div>
      </div>

      <!-- Page: Sector -->
      <div class="page" id="page-sector">
        <div class="section-title">板块热力图</div>
        <div class="card" style="margin-bottom:16px">
          <div id="sec-heat"></div>
        </div>
        <div class="chart-container" id="chart-heat"></div>

        <div class="section-title" style="margin-top:16px">资金流向</div>
        <div class="card-grid" style="margin-bottom:16px">
          <div class="card" id="sec-inflow"></div>
          <div class="card" id="sec-outflow"></div>
        </div>

        <div class="section-title">个股推荐</div>
        <div class="stock-grid" id="sec-stocks"></div>
      </div>

      <!-- Page: Prediction -->
      <div class="page" id="page-prediction">
        <div class="section-title">预测验证</div>
        <div id="pred-verify"></div>
        <div class="section-title" style="margin-top:16px">模型学习</div>
        <div id="pred-model"></div>
        <div id="pred-watch"></div>
      </div>

      <!-- Page: History -->
      <div class="page" id="page-history">
        <div class="section-title">五维历史走势</div>
        <div class="chart-container" id="chart-hist-line"></div>
        <div class="section-title" style="margin-top:16px">挨打指数趋势</div>
        <div class="chart-container" id="chart-hist-bi"></div>
        <div class="section-title" style="margin-top:16px">预测准确率累计</div>
        <div class="chart-container" id="chart-hist-acc"></div>
      </div>

      <!-- Page: Weekly -->
      <div class="page" id="page-weekly">
        <div class="section-title">周度复盘</div>
        <div id="weekly-content"></div>
      </div>
    </div>
  </div>
</div>

<!-- Bottom nav (mobile) -->
<div class="bottom-nav">
  <div class="bnav-item active" id="bnav-overview" onclick="switchPage('overview')">
    <span class="bnav-icon">📊</span><span>总览</span>
  </div>
  <div class="bnav-item" id="bnav-dimensions" onclick="switchPage('dimensions')">
    <span class="bnav-icon">🔍</span><span>五维</span>
  </div>
  <div class="bnav-item" id="bnav-sector" onclick="switchPage('sector')">
    <span class="bnav-icon">🔥</span><span>热力</span>
  </div>
  <div class="bnav-item" id="bnav-prediction" onclick="switchPage('prediction')">
    <span class="bnav-icon">🔮</span><span>预测</span>
  </div>
  <div class="bnav-item" id="bnav-history" onclick="switchPage('history')">
    <span class="bnav-icon">📈</span><span>历史</span>
  </div>
  <div class="bnav-item" id="bnav-weekly" onclick="switchPage('weekly')">
    <span class="bnav-icon">📅</span><span>周度</span>
  </div>
</div>

<script src="data.js"></script>
<script>


let curDate = DATES[DATES.length-1];
let curPage = 'overview';

function el(id) { return document.getElementById(id); }

function switchPage(pid) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.querySelectorAll('.bnav-item').forEach(n => n.classList.remove('active'));
  const p = el('page-' + pid); if(p) p.classList.add('active');
  const n = el('nav-' + pid); if(n) n.classList.add('active');
  const b = el('bnav-' + pid); if(b) b.classList.add('active');
  curPage = pid;
  setTimeout(() => { initChartsForPage(pid); }, 50);
}

function renderAll() {
  const d = MARKET_DATA[curDate];
  if(!d) return;

  // Overview
  renderOverview(d);
  // Dimensions
  renderDimensions(d);
  // Sector
  renderSector(d);
  // Prediction
  renderPrediction(d);
  // History charts
  initHistoryCharts();
  // Weekly
  renderWeekly();

  // Top date select
  const sel = el('date-select');
  if(sel) {
    sel.innerHTML = '';
    DATES.forEach(date => {
      const opt = document.createElement('option');
      opt.value = date;
      opt.textContent = date;
      sel.appendChild(opt);
    });
    sel.value = curDate;
  }
}

function getBiasClass(bias) {
  const b = String(bias);
  if(b.includes('多') || b.includes('强') || b.includes('暖') || b.includes('涨') || b.includes('牛')) return 'bull';
  if(b.includes('空') || b.includes('弱') || b.includes('跌') || b.includes('冷') || b.includes('杀') || b.includes('失') || b.includes('熊')) return 'bear';
  return 'neutral';
}

function getScoreColor(s) {
  if(s >= 7) return 'green';
  if(s >= 5) return 'orange';
  return 'red';
}

function renderOverview(d) {
  // Top3 vars
  let varsHtml = '';
  d.market_variables_top3.forEach((v, i) => {
    varsHtml += '<li><span class="num">' + (i+1) + '</span>' + v + '</li>';
  });
  const varsEl = el('ov-vars'); if(varsEl) varsEl.innerHTML = varsHtml;

  // Five dim cards
  const dims = ['macro','micro','peripheral','internal','style'];
  let dimCards = '';
  dims.forEach(key => {
    const dim = d.five_dimensions[key];
    const cls = getScoreColor(dim.score);
    const biasCls = getBiasClass(dim.bias);
    dimCards += '<div class="card">' +
      '<div class="flex-between" style="margin-bottom:8px">' +
      '<span class="card-title">' + dim.name + '</span>' +
      '<span class="tag ' + biasCls + '">' + dim.bias + '</span>' +
      '</div>' +
      '<div class="flex-between" style="margin-bottom:6px">' +
      '<span style="font-size:24px;font-weight:700">' + dim.score + '<span style="font-size:13px;color:var(--text2)">/10</span></span>' +
      '<span style="font-size:12px;color:var(--text2)">' + (dim.score*10) + '%</span>' +
      '</div>' +
      '<div class="progress-bg"><div class="progress-fill ' + cls + '" style="width:' + (dim.score*10) + '%"></div></div>' +
      '</div>';
  });
  const dimEl = el('ov-dims'); if(dimEl) dimEl.innerHTML = dimCards;

  // Summary cards
  const s = d.summary;
  const biColor = s.beating_index < 40 ? 'green' : (s.beating_index < 60 ? 'orange' : 'red');
  const stageCls = s.stage.includes('暴') || s.stage.includes('跌') ? 'bear' : (s.stage.includes('涨') || s.stage.includes('修') ? 'bull' : 'neutral');

  const sumEl = el('ov-summary');
  if(sumEl) {
    sumEl.innerHTML = '<div class="card score-big">' +
      '<div class="score-num" style="color:var(--' + getScoreColor(s.avg_score) + ')">' + s.avg_score + '</div>' +
      '<div class="score-label">五维平均分</div></div>' +
      '<div class="card score-big">' +
      '<div class="score-num" style="color:var(--' + biColor + ')">' + s.beating_index + '</div>' +
      '<div class="score-label">挨打指数</div>' +
      '<div class="progress-bg" style="margin-top:10px"><div class="progress-fill ' + biColor + '" style="width:' + s.beating_index + '%"></div></div></div>' +
      '<div class="card score-big">' +
      '<div class="score-num" style="font-size:28px"><span class="tag ' + stageCls + '">' + s.stage + '</span></div>' +
      '<div class="score-label" style="margin-top:10px">' + s.stage_desc + '</div></div>';
  }

  // Prediction
  const pred = d.next_day_prediction;
  const predEl = el('ov-pred');
  if(predEl) {
    const pcls = getBiasClass(pred.direction);
    predEl.innerHTML = '<div class="card">' +
      '<div class="card-title">明日预测</div>' +
      '<div style="display:flex;gap:16px;align-items:center;flex-wrap:wrap">' +
      '<div><div class="text-xs" style="color:var(--text2)">方向</div><div class="tag ' + pcls + '" style="margin-top:4px;font-size:14px">' + pred.direction + '</div></div>' +
      '<div><div class="text-xs" style="color:var(--text2)">置信度</div><div style="margin-top:4px;font-weight:700">' + pred.confidence + '%</div></div>' +
      '<div style="flex:1;min-width:200px"><div class="text-xs" style="color:var(--text2)">理由</div><div style="margin-top:4px;line-height:1.6">' + pred.reason + '</div></div>' +
      '</div></div>';
  }

  // Radar chart
  initRadarChart(d);
}

function renderDimensions(d) {
  const dims = ['macro','micro','peripheral','internal','style'];
  let html = '';
  dims.forEach(key => {
    const dim = d.five_dimensions[key];
    const cls = getScoreColor(dim.score);
    const biasCls = getBiasClass(dim.bias);
    html += '<div class="card" style="margin-bottom:16px">' +
      '<div class="flex-between" style="margin-bottom:12px">' +
      '<div><span class="card-title" style="font-size:18px">' + dim.name + '维度</span>' +
      '<span class="tag ' + biasCls + '" style="margin-left:8px">' + dim.bias + '</span></div>' +
      '<span style="font-size:32px;font-weight:700;color:var(--' + cls + ')">' + dim.score + '<span style="font-size:14px;color:var(--text2)">/10</span></span>' +
      '</div>' +
      '<div class="progress-bg" style="margin-bottom:16px;height:10px"><div class="progress-fill ' + cls + '" style="width:' + (dim.score*10) + '%"></div></div>' +
      '<div style="line-height:1.7;color:var(--text2);font-size:13px;margin-bottom:12px">' + dim.detail + '</div>';

    if(dim.derivation) {
      const drv = dim.derivation;
      html += '<div class="derive-block">' +
        '<div class="derive-title">推导链</div>';
      if(drv.inputs) {
        html += '<div style="margin:6px 0"><span class="derive-title">输入变量：</span><span class="derive-val">' + JSON.stringify(drv.inputs) + '</span></div>';
      }
      if(drv.weights) {
        html += '<div style="margin:6px 0"><span class="derive-title">权重分配：</span><span class="derive-val">' + JSON.stringify(drv.weights) + '</span></div>';
      }
      if(drv.calculation) {
        html += '<div style="margin:6px 0"><span class="derive-title">计算过程：</span><span class="derive-val">' + drv.calculation + '</span></div>';
      }
      if(drv.confidence) {
        html += '<div style="margin:6px 0"><span class="derive-title">置信度：</span><span class="derive-val">' + drv.confidence + '</span></div>';
      }
      html += '</div>';
    }
    html += '</div>';
  });
  const elv = el('dim-content'); if(elv) elv.innerHTML = html;
}

function renderSector(d) {
  // Heat bars
  const heat = d.sector_heat;
  const sorted = Object.entries(heat).sort((a,b) => b[1]-a[1]);
  let heatHtml = '';
  sorted.forEach(([name, val]) => {
    let color = val < 3 ? 'var(--green)' : (val < 7 ? 'var(--orange)' : 'var(--red)');
    heatHtml += '<div class="heat-bar">' +
      '<div class="heat-label">' + name + '</div>' +
      '<div class="heat-track"><div class="heat-fill" style="width:' + (val/10*100) + '%;background:' + color + '"></div></div>' +
      '<div class="heat-val" style="color:' + color + '">' + val + '</div>' +
      '</div>';
  });
  const he = el('sec-heat'); if(he) he.innerHTML = heatHtml;

  // Capital flow
  const cf = d.capital_flow;
  let inHtml = '<table class="flow-table"><tr><th>板块</th><th style="text-align:right">流入(亿)</th></tr>';
  cf.inflow.forEach(item => {
    inHtml += '<tr><td>' + item.name + '</td><td style="text-align:right;color:var(--green)">+' + item.amount + '</td></tr>';
  });
  inHtml += '</table>';
  let outHtml = '<table class="flow-table"><tr><th>板块</th><th style="text-align:right">流出(亿)</th></tr>';
  cf.outflow.forEach(item => {
    outHtml += '<tr><td>' + item.name + '</td><td style="text-align:right;color:var(--red)">' + item.amount + '</td></tr>';
  });
  outHtml += '</table>';
  const infEl = el('sec-inflow'); if(infEl) infEl.innerHTML = inHtml;
  const outfEl = el('sec-outflow'); if(outfEl) outfEl.innerHTML = outHtml;

  // Stocks
  const stocks = d.stock_picks;
  let stockHtml = '';
  stocks.forEach(st => {
    const scls = st.signal.includes('看多') || st.signal.includes('关注') ? 'bull' : (st.signal.includes('回避') || st.signal.includes('观望') ? 'bear' : 'neutral');
    stockHtml += '<div class="stock-card">' +
      '<div class="stock-header"><div><div class="stock-name">' + st.name + '</div><div class="stock-code">' + st.code + '</div></div>' +
      '<span class="tag ' + scls + '">' + st.signal + '</span></div>' +
      '<div style="margin-bottom:6px"><span style="font-size:18px;font-weight:700">' + st.score + '</span><span style="font-size:12px;color:var(--text2)">/10</span></div>' +
      '<div style="font-size:12px;color:var(--text2);line-height:1.5">' + st.reason + '</div>' +
      '</div>';
  });
  const stEl = el('sec-stocks'); if(stEl) stEl.innerHTML = stockHtml;

  initHeatChart(d);
}

function renderPrediction(d) {
  const pv = d.prediction_verify || {};
  let phtml = '<div class="card" style="margin-bottom:16px"><div class="card-title">预测验证</div>';
  if(pv.predicted_direction) {
    const rcls = pv.result === 'correct' ? 'bull' : (pv.result === 'partial' ? 'warn' : 'bear');
    const rtext = pv.result === 'correct' ? '✓ 正确' : (pv.result === 'partial' ? '~ 部分正确' : '✗ 错误');
    phtml += '<table class="flow-table">' +
      '<tr><td style="color:var(--text2)">预测方向</td><td><span class="tag ' + getBiasClass(pv.predicted_direction) + '">' + pv.predicted_direction + '</span></td></tr>' +
      '<tr><td style="color:var(--text2)">实际方向</td><td><span class="tag ' + getBiasClass(pv.actual_direction || '') + '">' + (pv.actual_direction || '-') + '</span></td></tr>' +
      '<tr><td style="color:var(--text2)">验证结果</td><td><span class="tag ' + rcls + '">' + rtext + '</span></td></tr>' +
      '<tr><td style="color:var(--text2)">置信度</td><td>' + (pv.predicted_confidence || '-') + '%</td></tr>' +
      '<tr><td style="color:var(--text2)">预测要点</td><td style="line-height:1.6">' + (pv.predicted_key || pv.content || '-') + '</td></tr>' +
      '<tr><td style="color:var(--text2)">实际情况</td><td style="line-height:1.6">' + (pv.actual_key || pv.actual || '-') + '</td></tr>' +
      '</table>';
  } else if (pv.content || pv.actual) {
    const rcls = pv.result === 'correct' ? 'bull' : (pv.result === 'partial' ? 'warn' : 'bear');
    const rtext = pv.result === 'correct' ? '✓ 正确' : (pv.result === 'partial' ? '~ 部分正确' : '✗ 错误');
    phtml += '<table class="flow-table">' +
      '<tr><td style="color:var(--text2)">来源</td><td>' + (pv.source || '-') + '</td></tr>' +
      '<tr><td style="color:var(--text2)">预测内容</td><td style="line-height:1.6">' + (pv.content || '-') + '</td></tr>' +
      '<tr><td style="color:var(--text2)">实际情况</td><td style="line-height:1.6">' + (pv.actual || '-') + '</td></tr>' +
      '<tr><td style="color:var(--text2)">验证结果</td><td><span class="tag ' + rcls + '">' + rtext + '</span></td></tr>' +
      '</table>';
  } else {
    phtml += '<div style="color:var(--text2)">无预测验证数据</div>';
  }
  phtml += '</div>';
  const pvEl = el('pred-verify'); if(pvEl) pvEl.innerHTML = phtml;

  // Model learning
  const ml = d.model_learning || {};
  let mhtml = '<div class="card"><div class="card-title">模型学习记录</div>';
  if(ml.correct_dimensions && ml.correct_dimensions.length) {
    mhtml += '<div class="derive-block" style="border-left-color:var(--green)"><div class="derive-title">正确维度</div><div class="derive-val">' + ml.correct_dimensions.join('、') + '</div></div>';
  }
  if(ml.wrong_dimensions && ml.wrong_dimensions.length) {
    mhtml += '<div class="derive-block" style="border-left-color:var(--red)"><div class="derive-title">错误维度</div><div class="derive-val">' + ml.wrong_dimensions.join('、') + '</div></div>';
  }
  if(ml.missed_variables && ml.missed_variables.length) {
    mhtml += '<div class="derive-block" style="border-left-color:var(--orange)"><div class="derive-title">遗漏变量</div><div class="derive-val">' + ml.missed_variables.map(v => '• ' + v).join('<br>') + '</div></div>';
  }
  if(ml.weight_adjustments) {
    mhtml += '<div style="margin-top:12px"><div class="derive-title">权重调整</div><table class="flow-table">' +
      '<tr><th>因子</th><th>调整</th></tr>';
    Object.entries(ml.weight_adjustments).forEach(([k, v]) => {
      mhtml += '<tr><td>' + k + '</td><td>' + v + '</td></tr>';
    });
    mhtml += '</table></div>';
  }
  if(ml.lessons && ml.lessons.length) {
    mhtml += '<div style="margin-top:12px"><div class="derive-title">教训总结</div><div class="derive-val">' + ml.lessons.map(v => '• ' + v).join('<br>') + '</div></div>';
  }
  mhtml += '</div>';
  const mlEl = el('pred-model'); if(mlEl) mlEl.innerHTML = mhtml;

  // Watchlist
  const wl = d.tomorrow_watchlist || [];
  let whtml = '<div class="card" style="margin-top:16px"><div class="card-title">明日监控清单</div><ul class="watch-list">';
  wl.forEach(item => {
    whtml += '<li>' + item + '</li>';
  });
  whtml += '</ul></div>';
  const wlEl = el('pred-watch'); if(wlEl) wlEl.innerHTML = whtml;
}

let charts = {};
function disposeChart(name) { if(charts[name]) { charts[name].dispose(); charts[name]=null; } }

function initRadarChart(d) {
  disposeChart('radar');
  const dom = el('chart-radar'); if(!dom) return;
  charts.radar = echarts.init(dom, 'dark');
  const dims = ['宏观','微观','外围','内围','风格'];
  const keys = ['macro','micro','peripheral','internal','style'];
  const vals = keys.map(k => d.five_dimensions[k].score);
  charts.radar.setOption({
    backgroundColor: 'transparent',
    tooltip: {},
    radar: {
      indicator: dims.map(n => ({name: n, max: 10})),
      shape: 'polygon',
      splitNumber: 5,
      axisName: { color: '#94a3b8' },
      splitLine: { lineStyle: { color: '#1e293b' } },
      splitArea: { areaStyle: { color: ['rgba(13,19,33,0.5)', 'rgba(13,19,33,0.8)'] } },
      axisLine: { lineStyle: { color: '#1e293b' } }
    },
    series: [{
      type: 'radar', data: [{
        value: vals, name: '五维评分',
        areaStyle: { color: 'rgba(59,130,246,0.25)' },
        lineStyle: { color: '#3b82f6', width: 2 },
        itemStyle: { color: '#3b82f6' }
      }]
    }]
  });
}

function initHeatChart(d) {
  disposeChart('heat');
  const dom = el('chart-heat'); if(!dom) return;
  charts.heat = echarts.init(dom, 'dark');
  const entries = Object.entries(d.sector_heat).sort((a,b) => a[1]-b[1]);
  const names = entries.map(e => e[0]);
  const vals = entries.map(e => e[1]);
  const colors = vals.map(v => v < 3 ? '#22c55e' : (v < 7 ? '#f59e0b' : '#ef4444'));
  charts.heat.setOption({
    backgroundColor: 'transparent',
    tooltip: { trigger: 'axis' },
    grid: { left: '3%', right: '8%', bottom: '3%', top: '3%', containLabel: true },
    xAxis: { type: 'value', max: 10, axisLabel: { color: '#94a3b8' }, splitLine: { lineStyle: { color: '#1e293b' } } },
    yAxis: { type: 'category', data: names, axisLabel: { color: '#e2e8f0' }, axisLine: { lineStyle: { color: '#1e293b' } } },
    series: [{
      type: 'bar', data: vals.map((v,i) => ({value: v, itemStyle: { color: colors[i] }})),
      label: { show: true, position: 'right', color: '#e2e8f0' },
      barWidth: '60%'
    }]
  });
}

function initHistoryCharts() {
  const dateArr = DATES;
  const dims = ['macro','micro','peripheral','internal','style'];
  const dimNames = ['宏观','微观','外围','内围','风格'];
  const dimColors = ['#3b82f6','#22c55e','#f59e0b','#8b5cf6','#ec4899'];

  // 五维折线
  disposeChart('hist-line');
  const dom1 = el('chart-hist-line'); if(dom1) {
    charts['hist-line'] = echarts.init(dom1, 'dark');
    const series = dims.map((k,i) => ({
      name: dimNames[i], type: 'line', data: dateArr.map(d => HISTORY[d][k]),
      smooth: true, symbol: 'circle', symbolSize: 8,
      lineStyle: { width: 2, color: dimColors[i] },
      itemStyle: { color: dimColors[i] }
    }));
    charts['hist-line'].setOption({
      backgroundColor: 'transparent',
      tooltip: { trigger: 'axis' },
      legend: { data: dimNames, textStyle: { color: '#94a3b8' }, top: 0 },
      grid: { left: '3%', right: '4%', bottom: '3%', top: 40, containLabel: true },
      xAxis: { type: 'category', data: dateArr, axisLabel: { color: '#94a3b8' }, axisLine: { lineStyle: { color: '#1e293b' } } },
      yAxis: { type: 'value', min: 0, max: 10, axisLabel: { color: '#94a3b8' }, splitLine: { lineStyle: { color: '#1e293b' } } },
      series: series
    });
  }

  // 挨打指数
  disposeChart('hist-bi');
  const dom2 = el('chart-hist-bi'); if(dom2) {
    charts['hist-bi'] = echarts.init(dom2, 'dark');
    const biData = dateArr.map(d => HISTORY[d].beating_index);
    charts['hist-bi'].setOption({
      backgroundColor: 'transparent',
      tooltip: { trigger: 'axis' },
      grid: { left: '3%', right: '4%', bottom: '3%', top: 30, containLabel: true },
      xAxis: { type: 'category', data: dateArr, axisLabel: { color: '#94a3b8' }, axisLine: { lineStyle: { color: '#1e293b' } } },
      yAxis: { type: 'value', min: 0, max: 100, axisLabel: { color: '#94a3b8' }, splitLine: { lineStyle: { color: '#1e293b' } } },
      series: [{
        type: 'line', data: biData, smooth: true, areaStyle: { color: 'rgba(245,158,11,0.2)' },
        lineStyle: { color: '#f59e0b', width: 2 }, itemStyle: { color: '#f59e0b' }, symbol: 'circle', symbolSize: 8
      }]
    });
  }

  // 准确率
  disposeChart('hist-acc');
  const dom3 = el('chart-hist-acc'); if(dom3) {
    charts['hist-acc'] = echarts.init(dom3, 'dark');
    charts['hist-acc'].setOption({
      backgroundColor: 'transparent',
      tooltip: { trigger: 'axis', formatter: p => p[0].name + '<br>累计准确率: ' + p[0].value + '%' },
      grid: { left: '3%', right: '4%', bottom: '3%', top: 30, containLabel: true },
      xAxis: { type: 'category', data: dateArr, axisLabel: { color: '#94a3b8' }, axisLine: { lineStyle: { color: '#1e293b' } } },
      yAxis: { type: 'value', min: 0, max: 100, axisLabel: { color: '#94a3b8', formatter: '{value}%' }, splitLine: { lineStyle: { color: '#1e293b' } } },
      series: [{
        type: 'line', data: ACCURACY.map(a => a.accuracy), smooth: true, areaStyle: { color: 'rgba(34,197,94,0.2)' },
        lineStyle: { color: '#22c55e', width: 2 }, itemStyle: { color: '#22c55e' }, symbol: 'circle', symbolSize: 8
      }]
    });
  }
}

function renderWeekly() {
  const wc = el('weekly-content'); if(!wc) return;
  if(typeof weeklyReviews === 'undefined' || !weeklyReviews) {
    wc.innerHTML = '<div style="color:var(--text2);padding:20px">暂无周度复盘数据</div>';
    return;
  }
  // Find latest weekly review
  const dates = Object.keys(weeklyReviews).sort();
  if(dates.length === 0) {
    wc.innerHTML = '<div style="color:var(--text2);padding:20px">暂无周度复盘数据</div>';
    return;
  }
  const latest = dates[dates.length-1];
  const w = weeklyReviews[latest];
  let html = '';
  
  // Week range
  if(w.week_range) {
    html += '<div class="card" style="margin-bottom:16px"><div class="card-title">本周区间</div><div style="font-size:15px;font-weight:600">' + w.week_range + '</div></div>';
  }
  
  // Weekly highlights
  if(w.key_events && w.key_events.length) {
    html += '<div class="card" style="margin-bottom:16px"><div class="card-title">本周要点</div><ul class="var-list">';
    w.key_events.forEach((ev, i) => {
      html += '<li><span class="num">' + (i+1) + '</span>' + ev + '</li>';
    });
    html += '</ul></div>';
  }
  
  // Prediction verify
  if(w.weekly_prediction_verify && w.weekly_prediction_verify.length) {
    html += '<div class="card" style="margin-bottom:16px"><div class="card-title">预测验证</div><table class="flow-table">';
    html += '<tr><th>日期</th><th>预测</th><th>实际</th><th>结果</th></tr>';
    w.weekly_prediction_verify.forEach(p => {
      const rcls = p.result === 'correct' ? 'bull' : (p.result === 'partial' ? 'warn' : 'bear');
      const rtext = p.result === 'correct' ? '✓' : (p.result === 'partial' ? '~' : '✗');
      html += '<tr><td>' + p.date + '</td><td>' + (p.prediction || '-') + '</td><td>' + (p.actual || '-') + '</td><td><span class="tag ' + rcls + '">' + rtext + ' ' + p.result + '</span></td></tr>';
    });
    html += '</table></div>';
  }
  
  // Next week outlook
  if(w.next_week_outlook) {
    const nwo = w.next_week_outlook;
    html += '<div class="card" style="margin-bottom:16px"><div class="card-title">下周展望</div>';
    html += '<div style="margin-bottom:12px"><span class="text-sm" style="color:var(--text2)">整体方向</span><span class="tag ' + getBiasClass(nwo.direction) + '" style="margin-left:8px">' + (nwo.direction || '震荡') + '</span></div>';
    if(nwo.confidence) {
      html += '<div style="margin-bottom:12px"><span class="text-sm" style="color:var(--text2)">置信度</span><span style="margin-left:8px;font-weight:700">' + nwo.confidence + '%</span></div>';
    }
    if(nwo.key_catalysts && nwo.key_catalysts.length) {
      html += '<div style="margin-bottom:12px"><span class="text-sm" style="color:var(--text2)">关键催化</span><ul class="watch-list">';
      nwo.key_catalysts.forEach(c => { html += '<li>' + c + '</li>'; });
      html += '</ul></div>';
    }
    if(nwo.risks && nwo.risks.length) {
      html += '<div style="margin-bottom:12px"><span class="text-sm" style="color:var(--text2)">风险点</span><ul class="watch-list">';
      nwo.risks.forEach(r => { html += '<li>' + r + '</li>'; });
      html += '</ul></div>';
    }
    if(nwo.monitor_list && nwo.monitor_list.length) {
      html += '<div><span class="text-sm" style="color:var(--text2)">监控清单</span><ul class="watch-list">';
      nwo.monitor_list.forEach(m => { html += '<li>' + m + '</li>'; });
      html += '</ul></div>';
    }
    html += '</div>';
  }
  
  wc.innerHTML = html;
}

function initChartsForPage(pid) {
  if(pid === 'overview') {
    const d = MARKET_DATA[curDate]; if(d) initRadarChart(d);
  } else if(pid === 'sector') {
    const d = MARKET_DATA[curDate]; if(d) initHeatChart(d);
  } else if(pid === 'history') {
    initHistoryCharts();
  }
}

function onDateChange(val) {
  curDate = val;
  renderAll();
  setTimeout(() => { initChartsForPage(curPage); }, 50);
}

window.addEventListener('resize', () => {
  Object.values(charts).forEach(c => { if(c) c.resize(); });
});

document.addEventListener('DOMContentLoaded', () => {
  renderAll();
  switchPage('overview');
});
